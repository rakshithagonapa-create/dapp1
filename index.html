<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Account Holders Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #5f7cff, #2ed8a3);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
    }

    .connected {
      font-size: 12px;
      color: #666;
      margin-bottom: 15px;
      word-break: break-all;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #5f7cff;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #4a63e0;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #555;
      white-space: pre-line;
      text-align: left;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>📋 Account Holders Details</h2>

    <button onclick="App.connectWallet()">🔗 Connect Wallet</button>

    <div id="walletAddress" class="connected">
      Not connected
    </div>

    <input id="name" placeholder="Enter Name" />
    <input id="date" type="date" />
    <input id="city" placeholder="City" />
    <input id="state" placeholder="State" />

    <button onclick="App.saveDetails()">💾 Save Details</button>

    <div id="status" class="status"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
